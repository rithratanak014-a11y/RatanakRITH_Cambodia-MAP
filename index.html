        <script>
    
    const img = document.querySelector('img[usemap]');
    const areas = document.querySelectorAll('area');

    areas.forEach(area => {
        area.dataset.originalCoords = area.getAttribute('coords');
    });

    function scaleCoords() {
        const scale = img.offsetWidth / img.naturalWidth;
        areas.forEach(area => {
            const scaled = area.dataset.originalCoords
                .split(',')
                .map(n => Math.round(n * scale))
                .join(',');
            area.setAttribute('coords', scaled);
        });
    }

    if (img.complete) {
        scaleCoords();
    } else {
        img.addEventListener('load', scaleCoords);
    }

    window.addEventListener('resize', scaleCoords);
</script>
